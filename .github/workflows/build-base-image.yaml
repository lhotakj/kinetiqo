name: Build Firebird Python Base Image

# ---------------------------------------------------------------------------
# This workflow compiles the Firebird client library and publishes a base
# Docker image that Kinetiqo (and other projects) can use as a FROM target.
#
# The heavy compilation (~40 min) is isolated here so the main application
# build remains fast.
#
# Trigger:   Manual only (workflow_dispatch)
# Publishes: lhotakj/firebird-python:<python_version>
#            lhotakj/firebird-python:<python_version>-firebird<firebird_version>
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version tag used as the base image (e.g. 3.13)'
        required: true
        default: '3.13'
      firebird_version:
        description: 'Firebird version to compile from source (e.g. 5.0.3)'
        required: true
        default: '5.0.3'
      platforms:
        description: 'Target platforms (comma-separated)'
        required: true
        default: 'linux/amd64,linux/arm64'

permissions:
  contents: read

jobs:
  build-base-image:
    name: Build & Push lhotakj/firebird-python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.firebird-base
          platforms: ${{ inputs.platforms }}
          push: true
          # no-cache ensures we always get the freshest Firebird source
          no-cache: true
          tags: |
            lhotakj/firebird-python:${{ inputs.python_version }}
            lhotakj/firebird-python:${{ inputs.python_version }}-firebird${{ inputs.firebird_version }}
          build-args: |
            PYTHON_VERSION=${{ inputs.python_version }}
            FIREBIRD_VERSION=${{ inputs.firebird_version }}

      - name: Add build summary
        run: |
          echo "### ✅ Base image published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`lhotakj/firebird-python\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | \`${{ inputs.python_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Firebird | \`${{ inputs.firebird_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | \`${{ inputs.platforms }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View on DockerHub](https://hub.docker.com/r/lhotakj/firebird-python/tags)" >> $GITHUB_STEP_SUMMARY

