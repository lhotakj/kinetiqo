name: Build and publish Docker image to DockerHub

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        if: contains(github.event.head_commit.message, '/release') || contains(github.event.head_commit.message, '/publish')
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        if: contains(github.event.head_commit.message, '/release') || contains(github.event.head_commit.message, '/publish')
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to Docker Hub
        if: contains(github.event.head_commit.message, '/release') || contains(github.event.head_commit.message, '/publish')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        if: contains(github.event.head_commit.message, '/release') || contains(github.event.head_commit.message, '/publish')
        run: |
          chmod +x build/build.sh
          cd build
          if [[ "${{ contains(github.event.head_commit.message, '/publish') }}" == "true" ]]; then
            ./build.sh --push
          fi

      - name: Get versions from build
        if: contains(github.event.head_commit.message, '/release') || contains(github.event.head_commit.message, '/publish')
        id: get_version
        run: |
          VERSION=$(cat ./src/version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          SHORT_VERSION=$(cat ./src/short_version.txt)
          echo "short_version=$SHORT_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        if: contains(github.event.head_commit.message, '/release') || contains(github.event.head_commit.message, '/publish')
        id: changelog
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });

            const lastTag = releases.length ? releases[0].tag_name : '';
            let commits;

            if (lastTag) {
              const comparison = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: lastTag,
                head: context.sha
              });
              commits = comparison.data.commits;
            } else {
              const allCommits = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              commits = allCommits.data;
            }

            const changelog = commits
              .map(c => `- ${c.commit.message.split('\n')[0]}`)
              .join('\n');

            const isPublish = context.payload.head_commit && context.payload.head_commit.message.includes('/publish');
            const version = process.env.VERSION || '';
            const dockerLink = isPublish && version
              ? `\n\n[View Docker image on DockerHub](https://hub.docker.com/r/lhotakj/kinetiqo/tags?name=${version})`
              : '';

            const fullChangelog = changelog + dockerLink;

            require('fs').writeFileSync('CHANGELOG.md', fullChangelog);

            // Write multiline output for changelog
            require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `changelog<<EOF\n${fullChangelog}\nEOF\n`);

      - name: Upload changelog as artifact
        if: (contains(github.event.head_commit.message, '/release') || contains(github.event.head_commit.message, '/publish')) && (steps.changelog.outputs.result != '')
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md

      - name: Create GitHub Release (on /release)
        if: contains(github.event.head_commit.message, '/release')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Add DockerHub link to build summary
        if: contains(github.event.head_commit.message, '/release') && contains(github.event.head_commit.message, '/publish')
        run: |
          echo "### Docker image published" >> $GITHUB_STEP_SUMMARY
          echo "[View Docker image on DockerHub](https://hub.docker.com/r/lhotakj/kinetiqo/tags?name=${{ steps.get_version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
