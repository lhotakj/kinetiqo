name: Build and publish Docker image to DockerHub

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          chmod +x build/build.sh
          cd build
          ./build.sh

      - name: Get versions from build
        id: get_version
        run: |
          VERSION=$(cat ./src/version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          SHORT_VERSION=$(cat ./src/short_version.txt)
          echo "short_version=$SHORT_VERSION" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        with:
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });

            const lastTag = releases.length ? releases[0].tag_name : '';
            let commits;

            if (lastTag) {
              const comparison = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: lastTag,
                head: context.sha
              });
              commits = comparison.data.commits;
            } else {
              const allCommits = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              commits = allCommits.data;
            }

            const changelog = commits
              .map(c => `- ${c.commit.message.split('\n')[0]}`)
              .join('\n');

            const isPublish = context.payload.head_commit && context.payload.head_commit.message.includes('/publish');
            const version = process.env.VERSION || '';
            const dockerLink = isPublish && version
              ? `\n\n[View Docker image on DockerHub](https://hub.docker.com/r/lhotakj/kinetiqo/tags?name=${version})`
              : '';

            // Write changelog to file for artifact upload
            require('fs').writeFileSync('CHANGELOG.md', changelog + dockerLink);

            // Output for use in release body
            return changelog + dockerLink;

      - name: Upload changelog as artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG.md
        if: steps.changelog.outputs.result != ''

      - name: Create GitHub Release (on /release or /publish)
        if: contains(github.event.head_commit.message, '/release') || contains(github.event.head_commit.message, '/publish')
        uses: actions/create-release@v1.5.3
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body: ${{ steps.changelog.outputs.result }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image (on /publish)
        if: contains(github.event.head_commit.message, '/publish')
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          SHORT_VERSION=${{ steps.get_version.outputs.short_version }}
          docker tag kinetiqo lhotakj/kinetiqo:$VERSION
          docker tag kinetiqo lhotakj/kinetiqo:$SHORT_VERSION
          docker tag kinetiqo lhotakj/kinetiqo:latest
          docker push lhotakj/kinetiqo:$VERSION
          docker push lhotakj/kinetiqo:$SHORT_VERSION
          docker push lhotakj/kinetiqo:latest

      - name: Add DockerHub link to build summary
        if: contains(github.event.head_commit.message, '/publish')
        run: |
          echo "### Docker image published" >> $GITHUB_STEP_SUMMARY
          echo "[View Docker image on DockerHub](https://hub.docker.com/r/lhotakj/kinetiqo/tags?name=${{ steps.get_version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
