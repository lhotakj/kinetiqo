<style>
    .select2-selection__choice__display {
        padding-left:15px !important;
    }
    /* Select2 Customization to match theme */
    .select2-container--default .select2-selection--multiple {
        border-color: #E5E7EB;
        border-radius: 0.5rem;
        padding: 0.25rem;
        min-height: 42px;

        /* Condensed State (Default) */
        max-height: 42px;
        overflow: hidden;
        transition: max-height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);

        /* Flex layout for summary text */
        display: flex;
        flex-wrap: wrap;
        align-items: center;
    }

    /* Expanded State (Focus or Open) */
    .select2-container--default.select2-container--focus .select2-selection--multiple,
    .select2-container--default.select2-container--open .select2-selection--multiple {
        max-height: 400px; /* Expand to show content */
        overflow-y: auto;

        /* Focus styles */
        border-color: #D1D5DB;
        outline: none;
        box-shadow: 0 0 0 1px #D1D5DB;
    }

    /* Hide choices in condensed state (except when container is focused/open) */
    .select2-container--default:not(.select2-container--focus):not(.select2-container--open) .select2-selection--multiple .select2-selection__choice {
        display: none;
    }

    /* Show summary text in condensed state */
    .select2-selection__summary {
        display: none;
        padding: 0 0.5rem;
        color: #374151;
        font-size: 0.875rem;
    }

    .select2-container--default:not(.select2-container--focus):not(.select2-container--open) .select2-selection__summary {
        display: block;
    }

    .select2-container--default .select2-selection--multiple .select2-selection__choice {
        background-color: #F3F4F6;
        border: 1px solid #E5E7EB;
        border-radius: 0.25rem;
        color: #374151;
        padding: 0 0.4rem;
        margin-top: 0.25rem;
    }
    .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
        color: #6B7280;
        margin-right: 0.25rem;
        border-right: none;
    }
    .select2-container--default .select2-results__option--highlighted.select2-results__option--selectable {
        background-color: #E5E7EB;
        color: #111827;
    }
    .select2-dropdown {
        border-color: #E5E7EB;
        border-radius: 0.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    /* Dark mode for Select2 */
    body.dark .select2-selection__summary {
        color: #d4d4d4;
    }
    body.dark .select2-container--default .select2-selection--multiple {
        background-color: #262626;
        border-color: #404040;
    }
    body.dark .select2-container--default .select2-selection--multiple .select2-selection__choice {
        background-color: #333333;
        border-color: #525252;
        color: #e5e5e5;
    }
    body.dark .select2-container--default .select2-selection--multiple .select2-selection__choice__remove {
        color: #a3a3a3;
    }
    body.dark .select2-container--default .select2-selection--multiple .select2-selection__choice__remove:hover {
        color: #e5e5e5;
    }
    body.dark .select2-dropdown {
        background-color: #262626;
        border-color: #404040;
    }
    body.dark .select2-results__option {
        color: #e5e5e5;
    }
    body.dark .select2-container--default .select2-results__option--highlighted.select2-results__option--selectable {
        background-color: #333333;
        color: #f5f5f5;
    }
    body.dark .select2-results__option--selected {
        background-color: #404040;
    }
    body.dark .select2-container--default .select2-results__group {
        color: #a3a3a3;
    }
    body.dark .select2-search__field {
        background-color: #1a1a1a;
        border-color: #525252;
        color: #e5e5e5;
    }

    /* Activity Icons */
    .activity-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        margin-right: 8px;
        border-radius: 50%;
        background-color: #F3F4F6;
        color: #4B5563;
        font-size: 12px;
    }

    /* Specific colors for common activities */
    .icon-Ride, .icon-GravelRide, .icon-MountainBikeRide, .icon-VirtualRide, .icon-EBikeRide, .icon-EMountainBikeRide, .icon-Velomobile, .icon-Handcycle { color: #EA580C; background-color: #FFEDD5; } /* Orange */
    .icon-Run, .icon-TrailRun, .icon-VirtualRun, .icon-Walk, .icon-Hike, .icon-Snowshoe, .icon-Wheelchair { color: #059669; background-color: #D1FAE5; } /* Emerald/Green */
    .icon-Swim, .icon-Surfing, .icon-Windsurf, .icon-Kitesurf, .icon-Kayaking, .icon-Rowing, .icon-Canoeing, .icon-StandUpPaddling, .icon-Sail { color: #0284C7; background-color: #E0F2FE; } /* Sky Blue */
    .icon-AlpineSki, .icon-BackcountrySki, .icon-NordicSki, .icon-Snowboard, .icon-IceSkate, .icon-RollerSki, .icon-InlineSkate { color: #2563EB; background-color: #DBEAFE; } /* Blue */
    .icon-Workout, .icon-WeightTraining, .icon-Crossfit, .icon-Yoga, .icon-Pilates, .icon-HighIntensityIntervalTraining, .icon-RockClimbing { color: #7C3AED; background-color: #EDE9FE; } /* Violet */
    .icon-Golf, .icon-Soccer, .icon-Tennis, .icon-Squash, .icon-Badminton, .icon-Pickleball, .icon-Racquetball, .icon-TableTennis { color: #DB2777; background-color: #FCE7F3; } /* Pink */
    .icon-StairStepper, .icon-Skateboard, .icon-Elliptical, .icon-VirtualRow { color: #9a16a1; background-color: #fde3ff; } /* Purple */

    /* Dynamic Select2 Choice Colors */
    .select2-selection__choice.choice-Ride, .select2-selection__choice.choice-GravelRide, .select2-selection__choice.choice-MountainBikeRide, .select2-selection__choice.choice-VirtualRide, .select2-selection__choice.choice-EBikeRide, .select2-selection__choice.choice-EMountainBikeRide, .select2-selection__choice.choice-Velomobile, .select2-selection__choice.choice-Handcycle { background-color: #FFEDD5 !important; color: #EA580C !important; border-color: #FDBA74 !important; }
    .select2-selection__choice.choice-Run, .select2-selection__choice.choice-TrailRun, .select2-selection__choice.choice-VirtualRun, .select2-selection__choice.choice-Walk, .select2-selection__choice.choice-Hike, .select2-selection__choice.choice-Snowshoe, .select2-selection__choice.choice-Wheelchair { background-color: #D1FAE5 !important; color: #059669 !important; border-color: #6EE7B7 !important; }
    .select2-selection__choice.choice-Swim, .select2-selection__choice.choice-Surfing, .select2-selection__choice.choice-Windsurf, .select2-selection__choice.choice-Kitesurf, .select2-selection__choice.choice-Kayaking, .select2-selection__choice.choice-Rowing, .select2-selection__choice.choice-Canoeing, .select2-selection__choice.choice-StandUpPaddling, .select2-selection__choice.choice-Sail { background-color: #E0F2FE !important; color: #0284C7 !important; border-color: #7DD3FC !important; }
    .select2-selection__choice.choice-AlpineSki, .select2-selection__choice.choice-BackcountrySki, .select2-selection__choice.choice-NordicSki, .select2-selection__choice.choice-Snowboard, .select2-selection__choice.choice-IceSkate, .select2-selection__choice.choice-RollerSki, .select2-selection__choice.choice-InlineSkate { background-color: #DBEAFE !important; color: #2563EB !important; border-color: #93C5FD !important; }
    .select2-selection__choice.choice-Workout, .select2-selection__choice.choice-WeightTraining, .select2-selection__choice.choice-Crossfit, .select2-selection__choice.choice-Yoga, .select2-selection__choice.choice-Pilates, .select2-selection__choice.choice-HighIntensityIntervalTraining, .select2-selection__choice.choice-RockClimbing { background-color: #EDE9FE !important; color: #7C3AED !important; border-color: #C4B5FD !important; }
    .select2-selection__choice.choice-Golf, .select2-selection__choice.choice-Soccer, .select2-selection__choice.choice-Tennis, .select2-selection__choice.choice-Squash, .select2-selection__choice.choice-Badminton, .select2-selection__choice.choice-Pickleball, .select2-selection__choice.choice-Racquetball, .select2-selection__choice.choice-TableTennis { background-color: #FCE7F3 !important; color: #DB2777 !important; border-color: #F9A8D4 !important; }
    .select2-selection__choice.choice-StairStepper, .select2-selection__choice.choice-Skateboard, .select2-selection__choice.choice-Elliptical, .select2-selection__choice.choice-VirtualRow { background-color: #fde3ff !important; color: #9a16a1 !important; border-color: #c9c1c9 !important; }

    /* DataTables Customization */
    .dt-buttons .dt-button {
        background-color: #f9fafb; /* bg-gray-50 */
        border: 1px solid #e5e7eb; /* border-gray-200 */
        border-radius: 0.375rem; /* rounded-md */
        color: #374151; /* text-gray-700 */
        font-size: 0.875rem; /* text-sm */
        font-weight: 500; /* font-medium */
        padding: 0.5rem 0.75rem; /* px-3 py-2 */
        height: 42px;
        transition: background-color 0.2s;
    }
    .dt-buttons .dt-button:hover {
        background-color: #f3f4f6; /* hover:bg-gray-100 */
    }

    /* Dark mode for DataTables buttons */
    body.dark .dt-buttons .dt-button {
        background-color: #262626;
        border-color: #404040;
        color: #d4d4d4;
    }
    body.dark .dt-buttons .dt-button:hover {
        background-color: #333333;
    }

    /* Dark mode for date filter dropdown */
    body.dark #dateFilter {
        background-color: #262626 !important;
        border-color: #404040;
        color: #e5e5e5;
    }
    body.dark #dateFilterDropdown {
        background-color: #262626;
        border-color: #404040;
    }
    body.dark .date-preset-btn {
        color: #e5e5e5;
    }
    body.dark .date-preset-btn:hover {
        background-color: #333333;
    }

    /* Dark mode for divider */
    body.dark .bg-gray-300 {
        background-color: #525252;
    }

    /* Dark mode for daterangepicker */
    body.dark .daterangepicker {
        background-color: #262626;
        border-color: #404040;
    }
    body.dark .daterangepicker .calendar-table {
        background-color: #262626;
        border-color: #404040;
    }
    body.dark .daterangepicker td, body.dark .daterangepicker th {
        color: #e5e5e5;
    }
    body.dark .daterangepicker td.off, body.dark .daterangepicker td.off.in-range, body.dark .daterangepicker td.off.start-date, body.dark .daterangepicker td.off.end-date {
        color: #737373;
    }
    body.dark .daterangepicker td.available:hover, body.dark .daterangepicker th.available:hover {
        background-color: #333333;
    }
    body.dark .daterangepicker td.active, body.dark .daterangepicker td.active:hover {
        background-color: #EA580C;
    }
    body.dark .daterangepicker .calendar-table thead tr {
        background-color: #1a1a1a;
    }
    body.dark .daterangepicker select {
        background-color: #1a1a1a;
        border-color: #525252;
        color: #e5e5e5;
    }
    body.dark .daterangepicker .ranges li {
        color: #e5e5e5;
    }
    body.dark .daterangepicker .ranges li:hover {
        background-color: #333333;
    }
    body.dark .daterangepicker .ranges li.active {
        background-color: #EA580C;
    }

    /* Prevent text wrapping and set minimum width for action/filter buttons */
    .activity-action-btn, .activity-filter-btn, .activity-export-btn {
        white-space: nowrap;
        min-width: 110px; /* Adjust as needed for your longest label */
        padding-left: 1rem;
        padding-right: 1rem;
    }
</style>

<div class="mb-8">
    <h1 class="font-serif text-3xl font-bold text-gray-900 mb-2">{{ title }}</h1>
</div>

<div class="bg-white rounded-lg p-4 mb-4 border border-gray-200">
    <div class="flex flex-col md:flex-row gap-4 items-end">
        <!-- Custom Search Input -->
        <div class="w-full md:w-64">
            <label for="customSearch" class="block text-sm font-medium text-gray-700 mb-1">Filter activities</label>
            <input type="text" id="customSearch" placeholder="Search by name..." class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-300 text-sm" style="min-height: 42px;">

                            <button class="date-preset-btn text-left px-2 py-1 hover:bg-gray-100 rounded text-sm" data-preset="today">Today</button>

                    <option value="Racquetball" selected>Racquetball</option>

                    <option value="RollerSki" selected>RollerSki</option>

<div class="bg-white rounded-lg">
    <table id="activitiesTable" class="w-full text-left border-collapse">
        <thead>
            <tr class="text-sm font-semibold text-gray-600 border-b border-gray-200">
                <th class="py-3 px-4 w-20">ID</th>
                <th class="py-3 px-4">Activity Name</th>
                <th class="py-3 px-4 w-32">Type</th>
                <th class="py-3 px-4 w-32">Date</th>
                <th class="py-3 px-4 w-32 text-right">Distance (km)</th>
                <th class="py-3 px-4 w-32 text-right">Elevation (m)</th>
                <th class="py-3 px-4 w-32">Moving Time</th>
                <th class="py-3 px-4 w-32">Avg Speed (km/h)</th>
                <th class="py-3 px-4 w-32">Avg HR (bpm)</th>
                <th class="py-3 px-4 w-32">Link to Strava</th>
                <th class="py-3 px-4 w-20 text-center">Delete</th>
            </tr>
        </thead>
        <tbody class="text-gray-700 text-sm">
        </tbody>
        <tfoot class="text-gray-700 text-sm font-semibold bg-gray-50 border-t border-gray-200">
            <tr>
                <td colspan="4" class="py-3 px-4 text-right">Totals:</td>
                <td class="py-3 px-4 text-right" id="totalDistance">0.0</td>
                <td class="py-3 px-4 text-right" id="totalElevation">0.00</td>
                <td class="py-3 px-4" id="totalMovingTime">00:00:00</td>
                <td colspan="4"></td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    $(document).ready(function() {
        var table = $('#activitiesTable').DataTable({
            "processing": true,
            "serverSide": false, // Client-side processing
            "pageLength": 50, // Increased page length to show more activities by default
            "lengthMenu": [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]], // Added length menu
            "order": [[3, "desc"]],
            "autoWidth": false, // Disable auto width calculation to use our custom widths
            "dom": 'Brt<"flex justify-between items-center mt-4"ilp>',
            "buttons": [
                {
                    extend: 'csv',
                    text: 'Export to CSV',
                    className: 'activity-export-btn px-3 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded text-sm font-medium transition h-[42px] flex items-center',
                    init: function(api, node, config) {
                        $(node).removeClass('dt-button buttons-csv buttons-html5');
                    }
                }
            ],
            "ajax": {
                "url": "/api/activities",
                "data": function(d) {
                    var selectedTypes = $('#activityTypeFilter').val();
                    if (selectedTypes === null || selectedTypes.length === 0) {
                        d.types = ["_NO_MATCH_"];
                    } else {
                        d.types = selectedTypes;
                    }

                    d.startDate = $('#startDate').val();
                    d.endDate = $('#endDate').val();
                }
            },
            "columns": [
                { "data": "id", "visible": false, "render": function(data) { return '#' + data; } },
                { "data": "name" },
                { "data": "type", "render": function(data) {
                    return `<div class="flex items-center">${getActivityIcon(data)}<span>${data}</span></div>`;
                }},
                {
                    "data": "date",
                    "render": {
                        "_": "display",
                        "sort": "timestamp"
                    }
                },
                {
                    "data": "distance",
                    "className": "text-right",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            return formatDistance(data);
                        }
                        return data;
                    }
                },
                {
                    "data": "elevation",
                    "className": "text-right",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            return formatElevation(data);
                        }
                        return data;
                    }
                },
                {
                    "data": "moving_time",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            return formatDuration(data);
                        }
                        return data;
                    }
                },
                {
                    "data": "average_speed",
                    "className": "text-right",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            // Convert m/s to km/h
                            return (data * 3.6).toFixed(1);
                        }
                        return data;
                    }
                },
                {
                    "data": "average_heartrate",
                    "className": "text-right",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            return data > 0 ? Math.round(data) : '-';
                        }
                        return data;
                    }
                },
                {
                    "data": null,
                    "orderable": false,
                    "render": function(data, type, row) {
                        return `<a href="https://www.strava.com/activities/${row.id}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 hover:underline">View on Strava</a>`;
                    }
                },
                {
                    "data": null,
                    "orderable": false,
                    "className": "text-center",
                    "render": function(data, type, row) {
                        return `<button onclick="deleteActivity('${row.id}')" class="text-red-500 hover:text-red-700 transition" title="Delete Activity">
                            <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>`;
                    }
                }
            ],
            "footerCallback": function(row, data, start, end, display) {
                var api = this.api();
                var json = api.ajax.json();

                if (json && json.totals) {
                    $('#totalDistance').html(formatDistance(json.totals.total_distance));
                    $('#totalElevation').html(formatElevation(json.totals.total_elevation));
                    $('#totalMovingTime').html(formatDuration(json.totals.total_moving_time));
                }
            },
            "language": {
                "search": "",
                "searchPlaceholder": "Filter activities...",
                "lengthMenu": "Show _MENU_ entries"
            }
        });

        // Move buttons to the container
        table.buttons().container().appendTo('#custom-buttons-wrapper');

        // Initialize Select2
        var $select = $('#activityTypeFilter').select2({
            placeholder: "Select activity types",
            width: '100%',
            closeOnSelect: false,
            templateSelection: function(data, container) {
                // Add custom class to selection container based on value
                if (data.id) {
                    $(container).addClass('choice-' + data.id);
                }
                return data.text;
            }
        });

        // Add summary element to the selection container
        var $container = $select.next('.select2-container').find('.select2-selection--multiple');
        $container.prepend('<div class="select2-selection__summary"></div>');

        function updateSummary() {
            var count = $('#activityTypeFilter').select2('data').length;
            var total = $('#activityTypeFilter option').length;
            var text = "";

            if (count === 0) {
                text = "No activities selected";
            } else if (count === total) {
                text = "All activities selected (" + count + ")";
            } else {
                text = count + " Activities selected";
            }

            $('.select2-selection__summary').text(text);
        }

        // Update summary on change
        $('#activityTypeFilter').on('change', updateSummary);

        // Initial update
        updateSummary();

        // Select All / Deselect All buttons
        $('#selectAllBtn').click(function() {
            $('#activityTypeFilter > optgroup > option').prop('selected', true);
            $('#activityTypeFilter').trigger('change');
        });

        $('#deselectAllBtn').click(function() {
            $('#activityTypeFilter > optgroup > option').prop('selected', false);
            $('#activityTypeFilter').trigger('change');
        });

        // Display on Map button - opens map page with current filters
        $('#displayOnMapBtn').click(function() {
            var params = new URLSearchParams();

            // Add selected activity types
            var selectedTypes = $('#activityTypeFilter').val();
            if (selectedTypes && selectedTypes.length > 0) {
                selectedTypes.forEach(function(type) {
                    params.append('types[]', type);
                });
            }

            // Add date filters
            var startDate = $('#startDate').val();
            var endDate = $('#endDate').val();
            if (startDate) {
                params.append('startDate', startDate);
            }
            if (endDate) {
                params.append('endDate', endDate);
            }

            // Navigate to map page with filters
            window.location.href = '/map?' + params.toString();
        });

        // Helper to get icon for activity type
        function getActivityIcon(type) {
            return `<span class="activity-icon icon-${type}">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm0-2a6 6 0 100-12 6 6 0 000 12z" clip-rule="evenodd"></path></svg>
            </span>`;
        }

        // Helper to format seconds into HH:MM:SS
        function formatDuration(seconds) {
            if (isNaN(seconds) || seconds < 0) {
                return "00:00:00";
            }
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        // Helper to format distance
        function formatDistance(meters) {
            if (isNaN(meters) || meters < 0) {
                return "0.0";
            }
            const km = meters / 1000;
            return km.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Helper to format elevation
        function formatElevation(meters) {
            if (isNaN(meters) || meters < 0) {
                return "0.00";
            }
            return meters.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // --- Date Filter Logic ---

        function updateDateFilterDisplay() {
            var startDate = $('#startDate').val();
            var endDate = $('#endDate').val();

            if (startDate && endDate) {
                var start = moment(startDate).format('MMM D, YYYY');
                var end = moment(endDate).format('MMM D, YYYY');
                $('#dateFilter span').text(start + ' - ' + end);
            } else if (startDate) {
                var start = moment(startDate).format('MMM D, YYYY');
                $('#dateFilter span').text('From ' + start);
            } else if (endDate) {
                var end = moment(endDate).format('MMM D, YYYY');
                $('#dateFilter span').text('To ' + end);
            } else {
                $('#dateFilter span').text('All time');
            }
        }

        $('#dateFilter').on('click', function(e) {
            e.stopPropagation();
            $('#dateFilterDropdown').toggleClass('hidden');
        });

        // Close dropdown when clicking outside
        $(document).on('click', function(e) {
            if (!$(e.target).closest('#dateFilterDropdown').length &&
                !$(e.target).closest('#dateFilter').length &&
                !$(e.target).closest('.daterangepicker').length) {

                $('#dateFilterDropdown').addClass('hidden');
                // Force hide pickers
                $('#startDate').data('daterangepicker').hide();
                $('#endDate').data('daterangepicker').hide();
            }
        });

        // Helper to initialize date picker with current value
        function initDatePicker(element) {
            var currentVal = $(element).val();
            var options = {
                singleDatePicker: true,
                showDropdowns: true,
                autoUpdateInput: false,
                locale: { format: 'YYYY-MM-DD', cancelLabel: 'Clear' }
            };

            if (currentVal) {
                options.startDate = currentVal;
            }

            $(element).daterangepicker(options).on('apply.daterangepicker', function(ev, picker) {
                $(this).val(picker.startDate.format('YYYY-MM-DD'));
                updateDateFilterDisplay();
                table.ajax.reload();
            }).on('cancel.daterangepicker', function(ev, picker) {
                $(this).val('');
                updateDateFilterDisplay();
                table.ajax.reload();
            });
        }

        initDatePicker('#startDate');
        initDatePicker('#endDate');

        $('.date-preset-btn').on('click', function() {
            var preset = $(this).data('preset');
            var presetText = $(this).text();
            var startDate, endDate;

            if (preset === 'all_time') {
                $('#startDate').val('');
                $('#endDate').val('');
            } else {
                switch (preset) {
                    case 'today':
                        startDate = moment();
                        endDate = moment();
                        break;
                    case 'yesterday':
                        startDate = moment().subtract(1, 'days');
                        endDate = moment().subtract(1, 'days');
                        break;
                    case 'last_week':
                        startDate = moment().subtract(1, 'week').startOf('week');
                        endDate = moment().subtract(1, 'week').endOf('week');
                        break;
                    case 'this_month':
                        startDate = moment().startOf('month');
                        endDate = moment().endOf('month');
                        break;
                    case 'this_year':
                        startDate = moment().startOf('year');
                        endDate = moment().endOf('year');
                        break;
                    case '7_days':
                        startDate = moment().subtract(6, 'days');
                        endDate = moment();
                        break;
                    case '14_days':
                        startDate = moment().subtract(13, 'days');
                        endDate = moment();
                        break;
                    case 'year':
                        startDate = moment().subtract(1, 'year');
                        endDate = moment();
                        break;
                }
                $('#startDate').val(startDate.format('YYYY-MM-DD'));
                $('#endDate').val(endDate.format('YYYY-MM-DD'));
            }

            // Re-init date pickers to update their internal state
            initDatePicker('#startDate');
            initDatePicker('#endDate');

            $('#dateFilter span').text(presetText);
            table.ajax.reload();
        });

        // --- General Table Logic ---

        // Bind custom search input to DataTable (Client-side search)
        $('#customSearch').on('keyup', function() {
            table.search(this.value).draw();
        });

        // Reload table when filter changes (fetches new dataset from server based on types)
        $('#activityTypeFilter').on('change', function() {
            table.ajax.reload();
        });

        // Global delete function
        window.deleteActivity = function(activityId) {
            if (confirm('Are you sure you want to delete this activity? This action cannot be undone.')) {
                $.ajax({
                    url: '/api/activities/' + activityId,
                    type: 'DELETE',
                    success: function(result) {
                        // Reload the table to reflect changes
                        table.ajax.reload(null, false); // false to keep current paging
                    },
                    error: function(xhr, status, error) {
                        alert('Error deleting activity: ' + error);
                    }
                });
            }
        };

        // Set initial state
        $('#startDate').val('');
        $('#endDate').val('');
        updateDateFilterDisplay();
    });
</script>

{% endblock %}
