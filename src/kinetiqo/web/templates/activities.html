{% extends "base.html" %}

{% block content %}
<div class="mb-8">
    <h1 class="font-serif text-3xl font-bold text-gray-900 mb-2">{{ title }}</h1>
    <p class="text-gray-500">Your recent Strava activities from the mock database.</p>
</div>

<div class="bg-white rounded-lg">
    <table id="activitiesTable" class="w-full text-left border-collapse">
        <thead>
            <tr class="text-sm font-semibold text-gray-600 border-b border-gray-200">
                <th class="py-3 px-4">ID</th>
                <th class="py-3 px-4">Activity Name</th>
                <th class="py-3 px-4">Type</th>
                <th class="py-3 px-4">Date</th>
                <th class="py-3 px-4">Distance (km)</th>
                <th class="py-3 px-4">Elevation (m)</th>
            </tr>
        </thead>
        <tbody class="text-gray-700 text-sm">
        </tbody>
    </table>
</div>

<script>
    $(document).ready(function() {
        $('#activitiesTable').DataTable({
            "processing": true,
            "serverSide": true,
            "pageLength": 10,
            "ajax": {
                "url": "/api/activities",
                "data": function(d) {
                    d.page = (d.start / d.length) + 1;
                    d.per_page = d.length;
                    d.sortColumn = d.columns[d.order[0].column].data;
                    d.sortDir = d.order[0].dir.toUpperCase();
                }
            },
            "columns": [
                { "data": "id", "render": function(data) { return '#' + data; } },
                { "data": "name" },
                { "data": "type", "render": function(data) {
                    const colors = {'Ride': 'orange', 'Run': 'blue', 'Swim': 'cyan'};
                    const color = colors[data] || 'gray';
                    return `<span class="px-2 py-1 rounded-full text-xs font-medium bg-${color}-100 text-${color}-800">${data}</span>`;
                }},
                { "data": "date" },
                { "data": "distance" },
                { "data": "elevation" }
            ],
            "language": {
                "search": "",
                "searchPlaceholder": "Filter activities..."
            },
            "dom": '<"flex justify-between items-center mb-4"f>rt<"flex justify-between items-center mt-4"ip>'
        });

        $('.dataTables_filter input').addClass('px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-gray-300 text-sm w-64');
    });
</script>

{% endblock %}
