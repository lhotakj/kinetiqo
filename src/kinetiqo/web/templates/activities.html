        display: flex;
        flex-wrap: wrap;
        align-items: center;

    /* Expanded State (Focus or Open) */
    .select2-container--default.select2-container--focus .select2-selection--multiple,

        max-height: 400px; /* Expand to show content */

<div class="mb-8">

<script>
    $(document).ready(function() {
        const FILTER_STORAGE_KEY = 'kinetiqoActivityFilters';
        const SELECTION_STORAGE_KEY = 'kinetiqoSelectedActivities';
        let currentDatePreset = 'custom'; // Track current preset in memory
        let selectedActivities = new Set();

        // 1. Load Filters immediately
        function loadFilters() {
            try {
                const filters = JSON.parse(localStorage.getItem(FILTER_STORAGE_KEY) || '{}');
                if (filters.types) $('#activityTypeFilter').val(filters.types);
                if (filters.startDate) $('#startDate').val(filters.startDate);
                if (filters.endDate) $('#endDate').val(filters.endDate);
                if (filters.search) $('#customSearch').val(filters.search);
                if (filters.datePreset) currentDatePreset = filters.datePreset;
                return filters;
            } catch (e) { return {}; }
        }
        const savedFilters = loadFilters();

        // Load selection
        try {
            const savedSelection = JSON.parse(localStorage.getItem(SELECTION_STORAGE_KEY) || '[]');
            if (Array.isArray(savedSelection)) {
                savedSelection.forEach(id => selectedActivities.add(String(id)));
            }
        } catch (e) { console.error("Failed to load selection", e); }

        // 2. Initialize Select2
        var $select = $('#activityTypeFilter').select2({
            placeholder: "",
            width: '100%',
            closeOnSelect: false,
            templateSelection: function(data, container) {
                if (data.id) $(container).addClass('choice-' + data.id);
                return data.text;
            }
        });

        // Add summary element to the selection container
        var $container = $select.next('.select2-container').find('.select2-selection--multiple');
        $container.prepend('<div class="select2-selection__summary"></div>');

        function updateSummary() {
            var count = $('#activityTypeFilter').select2('data').length;
            var total = $('#activityTypeFilter option').length;
            var text = "";

            if (count === 0) {
                text = "No activities selected";
            } else if (count === total) {
                text = "All activities selected (" + count + ")";
            } else {
                text = count + " Activities selected";
            }

            $('.select2-selection__summary').text(text);
        }

        // Initial update of summary based on loaded values
        updateSummary();

        // 3. Date Logic Helpers
        function updateDateFilterDisplay(presetName) {
            if (presetName && presetName !== 'custom') {
                $('#dateFilter span').text(presetName);
                return;
            }

            var startDate = $('#startDate').val();
            var endDate = $('#endDate').val();
            if (startDate && endDate) {
                var start = moment(startDate).format('MMM D, YYYY');
                var end = moment(endDate).format('MMM D, YYYY');
                $('#dateFilter span').text(start + ' - ' + end);
            } else if (startDate) {
                var start = moment(startDate).format('MMM D, YYYY');
                $('#dateFilter span').text('From ' + start);
            } else if (endDate) {
                var end = moment(endDate).format('MMM D, YYYY');
                $('#dateFilter span').text('To ' + end);
            } else {
                $('#dateFilter span').text('All time');
            }
        }

        function saveFilters(presetName) {
            // Update current preset if provided
            if (presetName !== undefined) {
                currentDatePreset = presetName;
            }

            const filters = {
                types: $('#activityTypeFilter').val(),
                startDate: $('#startDate').val(),
                endDate: $('#endDate').val(),
                search: $('#customSearch').val(),
                datePreset: currentDatePreset
            };
            localStorage.setItem(FILTER_STORAGE_KEY, JSON.stringify(filters));
        }

        function saveSelection() {
            localStorage.setItem(SELECTION_STORAGE_KEY, JSON.stringify(Array.from(selectedActivities)));
        }

        function initDatePicker(element) {
            var currentVal = $(element).val();
            var options = {
                singleDatePicker: true,
                showDropdowns: true,
                autoUpdateInput: false,
                locale: { format: 'YYYY-MM-DD', cancelLabel: 'Clear' }
            };

            if (currentVal) {
                options.startDate = currentVal;
            }

            $(element).daterangepicker(options).on('apply.daterangepicker', function(ev, picker) {
                $(this).val(picker.startDate.format('YYYY-MM-DD'));
                updateDateFilterDisplay('custom');
                saveFilters('custom');
                table.ajax.reload();
            }).on('cancel.daterangepicker', function(ev, picker) {
                $(this).val('');
                updateDateFilterDisplay('custom');
                saveFilters('custom');
                table.ajax.reload();
            });
        }

        initDatePicker('#startDate');
        initDatePicker('#endDate');

        // Restore preset display
        updateDateFilterDisplay(currentDatePreset);

        // 4. Initialize DataTable
        var table = $('#activitiesTable').DataTable({
            "processing": true,
            "serverSide": false, // Client-side processing
            "pageLength": 25,
            "lengthMenu": [[10, 25, 50, 100, -1], [10, 25, 50, 100, "All"]], // Added length menu
            "order": [[4, "desc"]],
            "autoWidth": false, // Disable auto width calculation to use our custom widths
            "dom": 'Brt<"flex justify-between items-center mt-4"ilp>',
            "search": {
                "search": savedFilters.search || "" // Initialize with saved search
            },
            "buttons": [],
            "ajax": {
                "url": "/api/activities",
                "data": function(d) {
                    var selectedTypes = $('#activityTypeFilter').val();
                    if (selectedTypes === null || selectedTypes.length === 0) {
                        d.types = ["_NO_MATCH_"];
                    } else {
                        d.types = selectedTypes;
                    }

                    d.startDate = $('#startDate').val();
                    d.endDate = $('#endDate').val();
                },
                "dataSrc": function(json) {
                    return json.data;
                }
            },
            "columns": [
                {
                    "data": "id",
                    "orderable": false,
                    "className": "text-center",
                    "render": function(data, type, row) {
                        return `<input type="checkbox" class="activity-checkbox" value="${data}">`;
                    }
                },
                { "data": "id", "visible": false, "render": function(data) { return '#' + data; } },
                { "data": "name" },
                { "data": "type", "render": function(data) {
                    return `<div class="flex items-center">${getActivityIcon(data)}<span>${data}</span></div>`;
                }},
                {
                    "data": "date",
                    "render": {
                        "_": "display",
                        "sort": "timestamp"
                    }
                },
                {
                    "data": "distance",
                    "className": "text-right",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            return formatDistance(data);
                        }
                        return data;
                    }
                },
                {
                    "data": "elevation",
                    "className": "text-right",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            return formatElevation(data);
                        }
                        return data;
                    }
                },
                {
                    "data": "moving_time",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            return formatDuration(data);
                        }
                        return data;
                    }
                },
                {
                    "data": "average_speed",
                    "className": "text-right",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            // Convert m/s to km/h
                            return (data * 3.6).toFixed(1);
                        }
                        return data;
                    }
                },
                {
                    "data": "average_heartrate",
                    "className": "text-right",
                    "render": function(data, type, row) {
                        if (type === 'display') {
                            return data > 0 ? Math.round(data) : '-';
                        }
                        return data;
                    }
                },
                {
                    "data": null,
                    "orderable": false,
                    "render": function(data, type, row) {
                        return `<a href="https://www.strava.com/activities/${row.id}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:text-blue-800 hover:underline">View on Strava</a>`;
                    }
                },
                {
                    "data": null,
                    "orderable": false,
                    "className": "text-center",
                    "render": function(data, type, row) {
                        return `<button onclick="deleteActivity('${row.id}')" class="text-red-500 hover:text-red-700 transition" title="Delete Activity">
                            <svg class="w-5 h-5 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>`;
                    }
                }
            ],
            "footerCallback": function(row, data, start, end, display) {
                var api = this.api();
                var json = api.ajax.json();

                if (json && json.totals) {
                    $('#totalDistance').html(formatDistance(json.totals.total_distance));
                    $('#totalElevation').html(formatElevation(json.totals.total_elevation));
                    $('#totalMovingTime').html(formatDuration(json.totals.total_moving_time));
                }
            },
            "language": {
                "search": "",
                "searchPlaceholder": "Filter activities...",
                "lengthMenu": "Show _MENU_ entries"
            },
            "initComplete": function(settings, json) {
                updateSelectionSummary();
            },
            "drawCallback": function(settings) {
                updateCheckboxes();
            }
        });

        // Move buttons to the container
        table.buttons().container().appendTo('#custom-buttons-wrapper');

        // 5. Bind Events for Persistence & Interaction
        $('#activityTypeFilter').on('change', function() {
            updateSummary();
            saveFilters(); // Uses current currentDatePreset
            table.ajax.reload();
        });

        $('#customSearch').on('keyup', function() {
            table.search(this.value).draw();
            saveFilters(); // Uses current currentDatePreset
        });

        $('#dateFilter').on('click', function(e) {
            e.stopPropagation();
            $('#dateFilterDropdown').toggleClass('hidden');
        });

        $(document).on('click', function(e) {
            if (!$(e.target).closest('#dateFilterDropdown').length &&
                !$(e.target).closest('#dateFilter').length &&
                !$(e.target).closest('.daterangepicker').length) {

                $('#dateFilterDropdown').addClass('hidden');
                $('#startDate').data('daterangepicker').hide();
                $('#endDate').data('daterangepicker').hide();
            }
        });

        $('.date-preset-btn').on('click', function() {
            var preset = $(this).data('preset');
            var presetText = $(this).text();
            var startDate, endDate;

            if (preset === 'all_time') {
                $('#startDate').val('');
                $('#endDate').val('');
            } else {
                switch (preset) {
                    case 'today':
                        startDate = moment();
                        endDate = moment();
                        break;
                    case 'yesterday':
                        startDate = moment().subtract(1, 'days');
                        endDate = moment().subtract(1, 'days');
                        break;
                    case 'last_week':
                        startDate = moment().subtract(1, 'week').startOf('week');
                        endDate = moment().subtract(1, 'week').endOf('week');
                        break;
                    case 'this_month':
                        startDate = moment().startOf('month');
                        endDate = moment().endOf('month');
                        break;
                    case 'this_year':
                        startDate = moment().startOf('year');
                        endDate = moment().endOf('year');
                        break;
                    case '7_days':
                        startDate = moment().subtract(6, 'days');
                        endDate = moment();
                        break;
                    case '14_days':
                        startDate = moment().subtract(13, 'days');
                        endDate = moment();
                        break;
                    case 'year':
                        startDate = moment().subtract(1, 'year');
                        endDate = moment();
                        break;
                }
                $('#startDate').val(startDate.format('YYYY-MM-DD'));
                $('#endDate').val(endDate.format('YYYY-MM-DD'));
            }

            // Re-init date pickers to update their internal state
            initDatePicker('#startDate');
            initDatePicker('#endDate');

            $('#dateFilter span').text(presetText);
            saveFilters(presetText); // Save the preset name
            table.ajax.reload();
        });

        // Select All / Deselect All buttons
        $('#selectAllBtn').click(function() {
            $('#activityTypeFilter > optgroup > option').prop('selected', true);
            $('#activityTypeFilter').trigger('change');
        });

        $('#deselectAllBtn').click(function() {
            $('#activityTypeFilter > optgroup > option').prop('selected', false);
            $('#activityTypeFilter').trigger('change');
        });

        // --- Selection Logic ---
        function updateSelectionButtons() {
            const count = selectedActivities.size;
            if (count > 0) {
                $('#deleteSelectedBtn').prop('disabled', false).removeClass('bg-gray-400').addClass('bg-red-500');
                $('#displayOnMapBtn').prop('disabled', false).removeClass('bg-gray-400').addClass('bg-orange-500');
                $('#exportCsvBtn').prop('disabled', false).removeClass('bg-gray-400').addClass('bg-blue-600');
            } else {
                $('#deleteSelectedBtn').prop('disabled', true).removeClass('bg-red-500').addClass('bg-gray-400');
                $('#displayOnMapBtn').prop('disabled', true).removeClass('bg-orange-500').addClass('bg-gray-400');
                $('#exportCsvBtn').prop('disabled', true).removeClass('bg-blue-600').addClass('bg-gray-400');
            }
        }

        function updateCheckboxes() {
            let allOnPageSelected = true;
            let onPageCount = 0;
            $('#activitiesTable tbody .activity-checkbox').each(function() {
                onPageCount++;
                const id = $(this).val();
                if (selectedActivities.has(id)) {
                    $(this).prop('checked', true);
                } else {
                    $(this).prop('checked', false);
                    allOnPageSelected = false;
                }
            });
            $('#selectAllOnPage').prop('checked', onPageCount > 0 && allOnPageSelected);
        }

        function updateSelectionSummary() {
            const summaryDiv = $('#selectionSummary');
            const count = selectedActivities.size;

            if (count === 0) {
                summaryDiv.html(''); // Clear the summary if nothing is selected
                return;
            }

            const allData = table.data().toArray();
            const selectedData = allData.filter(d => selectedActivities.has(String(d.id)));

            let totalDistance = 0;
            let totalElevation = 0;
            let totalMovingTime = 0;

            selectedData.forEach(row => {
                totalDistance += row.distance;
                totalElevation += row.elevation;
                totalMovingTime += row.moving_time;
            });

            const summaryText = `Total distance of selected activities: <strong>${formatDistance(totalDistance)}</strong> km, total elevation: <strong>${formatElevation(totalElevation)}</strong> (m), and total moving time: <strong>${formatDuration(totalMovingTime)}</strong>.`;
            summaryDiv.html(summaryText);
        }

        function clearSelection() {
            selectedActivities.clear();
            saveSelection();
            updateSelectionButtons();
            updateCheckboxes();
            updateSelectionSummary();
        }

        // Header checkbox
        $('#selectAllOnPage').on('click', function() {
            const isChecked = $(this).prop('checked');
            $('#activitiesTable tbody .activity-checkbox').each(function() {
                const id = $(this).val();
                if (isChecked) {
                    selectedActivities.add(id);
                } else {
                    selectedActivities.delete(id);
                }
            });
            saveSelection();
            updateSelectionButtons();
            updateCheckboxes();
            updateSelectionSummary();
        });

        // Row checkbox
        $('#activitiesTable tbody').on('click', '.activity-checkbox', function() {
            const id = $(this).val();
            if ($(this).prop('checked')) {
                selectedActivities.add(id);
            } else {
                selectedActivities.delete(id);
            }
            saveSelection();
            updateSelectionButtons();
            updateCheckboxes();
            updateSelectionSummary();
        });

        // Select all on all pages
        $('#selectAllOnAllPagesBtn').on('click', function() {
            const allData = table.rows({ search: 'applied' }).data();
            allData.each(function(d) {
                selectedActivities.add(String(d.id));
            });
            saveSelection();
            updateSelectionButtons();
            updateCheckboxes();
            updateSelectionSummary();
        });

        // Clear selection
        $('#clearSelectionBtn').on('click', function() {
            clearSelection();
        });

        // Delete selected
        $('#deleteSelectedBtn').on('click', function() {
            const count = selectedActivities.size;
            if (count === 0) return;

            if (confirm(`Are you sure you want to delete ${count} selected activities? This action cannot be undone.`)) {
                $.ajax({
                    url: '/api/activities',
                    type: 'DELETE',
                    contentType: 'application/json',
                    data: JSON.stringify({ activity_ids: Array.from(selectedActivities) }),
                    success: function(result) {
                        // Remove deleted IDs from selection
                        selectedActivities.clear();
                        saveSelection();
                        updateSelectionButtons();
                        updateSelectionSummary();

                        table.ajax.reload(null, false); // Reload and keep paging
                    },
                    error: function(xhr, status, error) {
                        alert('An error occurred while deleting activities: ' + error);
                        table.ajax.reload(null, false);
                    }
                });
            }
        });

        // Display on map
        $('#displayOnMapBtn').on('click', function() {
            if (selectedActivities.size === 0) return;

            // Create a hidden form
            const form = $('<form>', {
                method: 'POST',
                action: '/map',
                target: '_blank' // Open in new tab
            }).hide();

            // Add selected IDs as hidden inputs
            selectedActivities.forEach(id => {
                $('<input>').attr({
                    type: 'hidden',
                    name: 'activity_ids[]',
                    value: id
                }).appendTo(form);
            });

            // Append form to body and submit
            form.appendTo('body').submit();
            form.remove();
        });

        // Export to CSV
        $('#exportCsvBtn').on('click', function() {
            if (selectedActivities.size === 0) return;

            const allData = table.data().toArray();
            const selectedData = allData.filter(d => selectedActivities.has(String(d.id)));

            if (selectedData.length === 0) return;

            // Define CSV headers and data mapping
            const headers = ['ID', 'Activity Name', 'Type', 'Date', 'Distance (km)', 'Elevation (m)', 'Moving Time', 'Avg Speed (km/h)', 'Avg HR (bpm)'];

            const csvContent = [
                headers.join(','),
                ...selectedData.map(row => {
                    const dateStr = row.date && row.date.display ? row.date.display : row.date;
                    const distanceKm = (row.distance / 1000).toFixed(2);
                    const elevationM = row.elevation.toFixed(2); // Assuming elevation is in meters
                    const movingTime = formatDuration(row.moving_time);
                    const avgSpeed = (row.average_speed * 3.6).toFixed(1);
                    const avgHr = row.average_heartrate > 0 ? Math.round(row.average_heartrate) : '';

                    // Escape quotes in name
                    const name = `"${(row.name || '').replace(/"/g, '""')}"`;

                    return [
                        row.id,
                        name,
                        row.type,
                        dateStr,
                        distanceKm,
                        elevationM,
                        movingTime,
                        avgSpeed,
                        avgHr
                    ].join(',');
                })
            ].join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", "selected_activities.csv");
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        });


        // Helper to get icon for activity type
        function getActivityIcon(type) {
            return `<span class="activity-icon icon-${type}">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm0-2a6 6 0 100-12 6 6 0 000 12z" clip-rule="evenodd"></path></svg>
            </span>`;
        }

        // Helper to format seconds into HH:MM:SS
        function formatDuration(seconds) {
            if (isNaN(seconds) || seconds < 0) {
                return "00:00:00";
            }
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        // Helper to format distance
        function formatDistance(meters) {
            if (isNaN(meters) || meters < 0) {
                return "0.0";
            }
            const km = meters / 1000;
            return km.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Helper to format elevation
        function formatElevation(meters) {
            if (isNaN(meters) || meters < 0) {
                return "0.00";
            }
            return meters.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Global delete function
        window.deleteActivity = function(activityId) {
            if (confirm('Are you sure you want to delete this activity? This action cannot be undone.')) {
                $.ajax({
                    url: '/api/activities/' + activityId,
                    type: 'DELETE',
                    success: function(result) {
                        // Remove from selection if present
                        if (selectedActivities.has(String(activityId))) {
                            selectedActivities.delete(String(activityId));
                            saveSelection();
                            updateSelectionButtons();
                            updateSelectionSummary();
                        }

                        // Reload the table to reflect changes
                        table.ajax.reload(null, false); // false to keep current paging
                    },
                    error: function(xhr, status, error) {
                        alert('Error deleting activity: ' + error);
                    }
                });
            }
        };

        // Set initial state
        // Only clear if not loaded from storage (checked by value)
        if (!$('#startDate').val()) $('#startDate').val('');
        if (!$('#endDate').val()) $('#endDate').val('');

        // Initial update of buttons based on loaded selection
        updateSelectionButtons();
    });
</script>

{% endblock %}
