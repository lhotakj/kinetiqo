{% extends "base.html" %}

{% block content %}
<div class="">
    <div class="mb-8">
        <h1 class="text-3xl font-serif font-bold text-warm-900 mb-2">Settings</h1>
        <p class="text-gray-500">View system configuration and schedules.</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-warm-200 overflow-hidden">
        <div class="p-6 border-b border-warm-200 bg-warm-50">
            <h2 class="text-lg font-medium text-warm-900">Sync Schedules</h2>
            <p class="text-sm text-gray-500 mt-1">These schedules are defined by environment variables.</p>
        </div>

        <div class="p-6 space-y-6" id="settings-container">
            <!-- Full Sync -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Sync Schedule</label>
                <div class="relative">
                    <input type="text" id="full-sync-input" readonly
                           class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5"
                           value="Loading...">
                    <div class="mt-1 text-xs text-gray-500" id="full-sync-desc"></div>
                </div>
            </div>

            <!-- Fast Sync -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Fast Sync Schedule</label>
                <div class="relative">
                    <input type="text" id="fast-sync-input" readonly
                           class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5"
                           value="Loading...">
                    <div class="mt-1 text-xs text-gray-500" id="fast-sync-desc"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        fetch('/api/settings')
            .then(response => response.json())
            .then(data => {
                // Full Sync
                const fullSyncInput = document.getElementById('full-sync-input');
                const fullSyncDesc = document.getElementById('full-sync-desc');

                if (data.full_sync.expression) {
                    fullSyncInput.value = data.full_sync.expression;
                    fullSyncDesc.textContent = data.full_sync.description;
                } else {
                    fullSyncInput.value = "Not set";
                    fullSyncDesc.textContent = "No schedule configured";
                }

                // Fast Sync
                const fastSyncInput = document.getElementById('fast-sync-input');
                const fastSyncDesc = document.getElementById('fast-sync-desc');

                if (data.fast_sync.expression) {
                    fastSyncInput.value = data.fast_sync.expression;
                    fastSyncDesc.textContent = data.fast_sync.description;
                } else {
                    fastSyncInput.value = "Not set";
                    fastSyncDesc.textContent = "No schedule configured";
                }
            })
            .catch(error => {
                console.error('Error fetching settings:', error);
                document.getElementById('full-sync-input').value = "Error loading data";
                document.getElementById('fast-sync-input').value = "Error loading data";
            });
    });
</script>
{% endblock %}
