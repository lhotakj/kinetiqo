{% extends "base.html" %}

{% block content %}
<div class="mb-8">
    <h1 class="font-serif text-3xl font-bold text-gray-900 mb-2">{{ title }}</h1>
</div>

<!-- Controls -->
<div class="bg-white rounded-lg p-4 mb-6 border border-gray-200 shadow-sm">
    <div class="flex items-center gap-4 flex-wrap">
        <label class="inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" id="pavedOnlyToggle"
                   class="form-checkbox h-5 w-5 text-green-600 rounded border-gray-300 focus:ring-green-500">
            <span class="ml-2 text-gray-700 font-medium">Paved roads only</span>
        </label>

        <button id="expandAllBtn"
                class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded text-xs font-medium transition hidden">
            Expand all
        </button>
        <button id="collapseAllBtn"
                class="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded text-xs font-medium transition hidden">
            Collapse all
        </button>
        <button id="refreshBtn"
                class="px-3 py-1.5 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded text-xs font-medium transition hidden"
                title="Discard cached results and re-download fresh data from OpenStreetMap">
            ↻ Refresh data
        </button>
        <span id="cacheIndicator" class="text-xs text-gray-400 hidden"></span>

        <div class="text-sm text-gray-500 ml-auto">
            Analyzing <strong>{{ activity_ids|length }}</strong> activities
        </div>
    </div>
</div>

<!-- Loading state -->
<div id="loadingState" class="text-center py-16">
    <svg class="animate-spin h-10 w-10 text-green-600 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
    </svg>
    <p class="text-gray-600 font-medium">Downloading road data from OpenStreetMap&hellip;</p>
    <p class="text-sm text-gray-400 mt-1">This may take up to a minute for large areas</p>
</div>

<!-- Error state -->
<div id="errorState" class="hidden">
    <div class="bg-red-50 border border-red-200 rounded-lg p-5 text-red-700">
        <div class="flex items-center mb-1">
            <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="font-semibold">Analysis Failed</span>
        </div>
        <p id="errorMessage" class="text-sm ml-7"></p>
    </div>
</div>

<!-- Results -->
<div id="resultsState" class="hidden">
    <!-- Summary card -->
    <div class="bg-white rounded-lg border border-gray-200 p-6 shadow-sm mb-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">Overall Road Coverage</h2>
        <div class="flex items-center justify-between mb-2">
            <span id="summaryPct" class="text-4xl font-bold text-gray-900"></span>
            <span id="summaryKm" class="text-sm text-gray-500 text-right"></span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
            <div id="summaryBar" class="h-4 rounded-full transition-all duration-700 ease-out" style="width:0%"></div>
        </div>
    </div>

    <!-- Hierarchy tree -->
    <div id="hierarchyTree" class="space-y-2"></div>
</div>

<script>
/* ──────────────────── Configuration ──────────────────── */
const ACTIVITY_IDS = {{ activity_ids_json | safe }};

/* ──────────────────── Colour helpers ──────────────────── */

/** HSL-based smooth gradient: 0 % → red, 50 % → amber, 100 % → green */
function coverageColor(pct) {
    const hue = Math.round(Math.min(pct, 100) * 1.2); // 0 → 120
    return `hsl(${hue}, 72%, 45%)`;
}

/** Tailwind badge classes by coverage bracket */
function badgeClasses(pct) {
    if (pct < 15) return 'bg-red-100 text-red-800';
    if (pct < 30) return 'bg-orange-100 text-orange-800';
    if (pct < 50) return 'bg-amber-100 text-amber-800';
    if (pct < 70) return 'bg-yellow-100 text-yellow-800';
    if (pct < 85) return 'bg-lime-100 text-lime-800';
    return 'bg-green-100 text-green-800';
}

/** Human-readable level label with icon */
function levelIcon(level) {
    const m = {
        country:      '🌍',
        region:       '🏛️',
        district:     '📍',
        municipality: '🏘️',
        area:         '📐',
    };
    return m[level] || '📌';
}

/* ──────────────────── Tree rendering ──────────────────── */

let _nodeId = 0;

function renderNode(node, depth) {
    const id  = `me-node-${_nodeId++}`;
    const has = node.children && node.children.length > 0;
    const pad = depth * 1.25;                       // rem indent per level
    const col = coverageColor(node.percentage);
    const bc  = badgeClasses(node.percentage);

    let childrenHtml = '';
    if (has) {
        const inner = node.children.map(c => renderNode(c, depth + 1)).join('');
        childrenHtml = `
            <div id="${id}-ch" class="me-children hidden border-t border-gray-100 bg-gray-50/60 py-1.5 px-2 space-y-1.5">
                ${inner}
            </div>`;
    }

    return `
    <div class="me-node border border-gray-200 rounded-lg overflow-hidden bg-white" style="margin-left:${pad}rem">
        <!-- Header -->
        <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition cursor-pointer select-none"
             ${has ? `onclick="toggleMeNode('${id}')"` : ''}>
            ${has
                ? `<svg id="${id}-chev" class="me-chevron w-4 h-4 text-gray-400 transform transition-transform duration-200 flex-shrink-0"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                       <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                   </svg>`
                : '<span class="w-4 flex-shrink-0"></span>'}

            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-0.5">
                    <span class="text-base">${levelIcon(node.level)}</span>
                    <span class="font-semibold text-gray-900 truncate">${escHtml(node.name)}</span>
                    <span class="text-[10px] uppercase tracking-wider text-gray-400 font-medium">${node.level}</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="flex-1 bg-gray-200 rounded-full h-2 max-w-sm overflow-hidden">
                        <div class="h-2 rounded-full" style="width:${Math.min(node.percentage,100)}%;background:${col}"></div>
                    </div>
                    <span class="text-xs text-gray-500 whitespace-nowrap tabular-nums">
                        ${node.ridden_km.toFixed(1)}&thinsp;/&thinsp;${node.total_km.toFixed(1)}&nbsp;km
                    </span>
                </div>
            </div>

            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-sm font-bold whitespace-nowrap ${bc}">
                ${node.percentage.toFixed(1)}%
            </span>
        </div>
        ${childrenHtml}
    </div>`;
}

function toggleMeNode(id) {
    const ch  = document.getElementById(id + '-ch');
    const svg = document.getElementById(id + '-chev');
    if (ch)  ch.classList.toggle('hidden');
    if (svg) svg.classList.toggle('rotate-90');
}

function escHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

/* ──────────────────── Expand / Collapse all ──────────────────── */

function expandAll() {
    document.querySelectorAll('.me-children').forEach(el => el.classList.remove('hidden'));
    document.querySelectorAll('.me-chevron').forEach(el => el.classList.add('rotate-90'));
}

function collapseAll() {
    document.querySelectorAll('.me-children').forEach(el => el.classList.add('hidden'));
    document.querySelectorAll('.me-chevron').forEach(el => el.classList.remove('rotate-90'));
}

/* ──────────────────── API call ──────────────────── */

async function fetchExplorerData(pavedOnly, forceRefresh) {
    // show loading, hide others
    document.getElementById('loadingState').classList.remove('hidden');
    document.getElementById('errorState').classList.add('hidden');
    document.getElementById('resultsState').classList.add('hidden');
    document.getElementById('expandAllBtn').classList.add('hidden');
    document.getElementById('collapseAllBtn').classList.add('hidden');
    document.getElementById('refreshBtn').classList.add('hidden');
    document.getElementById('cacheIndicator').classList.add('hidden');

    try {
        const resp = await fetch('/api/mapexplorer/data', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                activity_ids: ACTIVITY_IDS,
                paved_only: pavedOnly,
                force_refresh: !!forceRefresh,
            }),
        });
        const data = await resp.json();

        document.getElementById('loadingState').classList.add('hidden');

        if (data.error) {
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = data.error;
            return;
        }

        // ── Summary ──
        const s = data.summary;
        document.getElementById('summaryPct').textContent = s.coverage_percentage.toFixed(2) + '%';
        document.getElementById('summaryKm').innerHTML =
            `<strong>${s.ridden_road_length_km.toFixed(1)}</strong> km ridden / ` +
            `<strong>${s.total_road_length_km.toFixed(1)}</strong> km total`;

        const bar = document.getElementById('summaryBar');
        bar.style.backgroundColor = coverageColor(s.coverage_percentage);
        requestAnimationFrame(() => { bar.style.width = Math.min(s.coverage_percentage, 100) + '%'; });

        // ── Tree ──
        const tree = document.getElementById('hierarchyTree');
        _nodeId = 0;
        if (data.hierarchy && data.hierarchy.length) {
            tree.innerHTML = data.hierarchy.map(n => renderNode(n, 0)).join('');
            document.getElementById('expandAllBtn').classList.remove('hidden');
            document.getElementById('collapseAllBtn').classList.remove('hidden');
        } else {
            tree.innerHTML = '<p class="text-gray-500 text-center py-6">No administrative boundary data available.</p>';
        }

        document.getElementById('resultsState').classList.remove('hidden');

        // Show toolbar buttons
        document.getElementById('refreshBtn').classList.remove('hidden');
        const ci = document.getElementById('cacheIndicator');
        if (data.cached) {
            ci.textContent = '⚡ Loaded from cache';
            ci.classList.remove('hidden');
        } else {
            ci.textContent = '✓ Fresh data';
            ci.classList.remove('hidden');
        }

    } catch (err) {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('errorState').classList.remove('hidden');
        document.getElementById('errorMessage').textContent = 'Request failed: ' + err.message;
    }
}

/* ──────────────────── Init ──────────────────── */

document.addEventListener('DOMContentLoaded', () => {
    fetchExplorerData(false, false);

    document.getElementById('pavedOnlyToggle').addEventListener('change', function () {
        fetchExplorerData(this.checked, false);
    });
    document.getElementById('expandAllBtn').addEventListener('click', expandAll);
    document.getElementById('collapseAllBtn').addEventListener('click', collapseAll);
    document.getElementById('refreshBtn').addEventListener('click', () => {
        fetchExplorerData(document.getElementById('pavedOnlyToggle').checked, true);
    });
});
</script>
{% endblock %}
