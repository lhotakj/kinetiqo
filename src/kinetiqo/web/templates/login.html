    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: { 50: '#F9F9F8', 100: '#F5F4F0' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Dark mode support */
        body { transition: background-color 0.3s, color 0.3s; }
        body.dark { background-color: #171717; }
        body.dark .bg-warm-100 { background-color: #171717; }
        body.dark .bg-white { background-color: #1a1a1a; border-color: #404040; }
        body.dark .text-gray-900 { color: #f5f5f5; }
        body.dark .text-gray-700 { color: #d4d4d4; }
        body.dark .text-gray-500 { color: #a3a3a3; }
        body.dark .text-gray-400 { color: #737373; }
        body.dark input { background-color: #262626; border-color: #404040; color: #e5e5e5; }
        body.dark input:focus { background-color: #2a2a2a; border-color: #525252; }
        body.dark input::placeholder { color: #737373; }
        body.dark .bg-gray-900 { background-color: #f5f5f5; color: #171717; }
        body.dark .bg-gray-900:hover { background-color: #e5e5e5; }
        body.dark .bg-red-50 { background-color: #7f1d1d; border-color: #991b1b; }
        body.dark .text-red-700 { color: #fca5a5; }
    </style>

    <script>
        // Apply saved theme from cookie immediately (before rendering)
        const cookies = document.cookie.split(';').map(c => c.trim().split('='));
        const themeCookie = cookies.find(c => c[0] === 'theme');
        if (themeCookie && themeCookie[1] === 'dark') {
            document.body.classList.add('dark');
        }
    </script>

            <h1 class="font-serif text-3xl font-bold text-gray-900">Kinetiqo</h1>
            <p class="text-gray-500 mt-2">Please sign in to access</p>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="mb-4 p-3 bg-red-50 text-red-700 text-sm rounded border border-red-200">
                {{ messages[0] }}
            </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition" placeholder="login">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition" placeholder="password">
            </div>

            <button type="submit" class="w-full bg-gray-900 text-white py-2.5 rounded-lg font-medium hover:bg-gray-800 transition shadow-sm">
                Sign In
            </button>
        </form>
