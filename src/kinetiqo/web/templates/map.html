{% extends "base.html" %}

{% block head %}
<style>
    /* Ensure Folium map fills the container */
    #map-container iframe {
        width: 100% !important;
        height: 100% !important;
        border: none;
    }

    /* Fix for Folium's inline map rendering */
    #map-container .folium-map {
        width: 100% !important;
        height: 100% !important;
    }

    /* Style for range inputs in dark mode */
    body.dark input[type="range"] {
        background-color: #404040;
    }

    body.dark select {
        background-color: #262626;
        border-color: #404040;
        color: #e5e5e5;
    }

    body.dark label {
        color: #d4d4d4;
    }
</style>
{% endblock %}

{% block content %}
<div class="flex flex-col h-full">
    <!-- Header with controls -->
    <div class="mb-4 flex flex-wrap justify-between items-center gap-4">
        <div>
            <h1 class="font-serif text-3xl font-bold text-gray-900 dark:text-gray-100 mb-1">{{ title }}</h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm">Visualizing selected activities on the map.</p>
        </div>
        <div class="flex flex-wrap items-center gap-4">
            <!-- Base Map Selector -->
            <div class="flex items-center gap-2">
                <label for="basemapPicker" class="text-sm font-medium text-gray-700 dark:text-gray-300">Base Map:</label>
                <select id="basemapPicker" class="h-9 px-2 rounded border border-gray-300 dark:border-gray-600 text-sm bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200">
                    {% for key, provider in tile_providers.items() %}
                    <option value="{{ key }}" {% if key == current_basemap %}selected{% endif %}>{{ provider.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Color Picker -->
            <div class="flex items-center gap-2">
                <label for="colorPicker" class="text-sm font-medium text-gray-700 dark:text-gray-300">Color:</label>
                <input type="color" id="colorPicker" value="{{ current_color }}" class="h-9 w-16 p-1 rounded border border-gray-300 dark:border-gray-600 cursor-pointer">
            </div>

            <!-- Width Slider -->
            <div class="flex items-center gap-2">
                <label for="widthPicker" class="text-sm font-medium text-gray-700 dark:text-gray-300">Width:</label>
                <input type="range" id="widthPicker" min="1" max="20" value="{{ current_width }}" class="w-24 h-2 bg-gray-200 dark:bg-gray-600 rounded-lg appearance-none cursor-pointer">
                <span id="widthValue" class="text-sm text-gray-500 dark:text-gray-400 w-6">{{ current_width }}</span>
            </div>

            <!-- Opacity Slider -->
            <div class="flex items-center gap-2">
                <label for="opacityPicker" class="text-sm font-medium text-gray-700 dark:text-gray-300">Opacity:</label>
                <input type="range" id="opacityPicker" min="0" max="100" value="{{ current_opacity }}" class="w-24 h-2 bg-gray-200 dark:bg-gray-600 rounded-lg appearance-none cursor-pointer">
                <span id="opacityValue" class="text-sm text-gray-500 dark:text-gray-400 w-8">{{ current_opacity }}%</span>
            </div>

            <!-- Export Button -->
            <button id="exportBtn" class="px-4 py-2 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 rounded-lg text-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-600 transition shadow-sm flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Export PNG
            </button>

            <!-- Back to List -->
            <a href="{{ url_for('activities') }}" class="px-4 py-2 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg text-sm font-medium transition">
                Back to List
            </a>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map-container" class="flex-1 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden relative z-0" style="min-height: 500px;">
        {{ map_html|safe }}
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    // Update URL helper - preserves existing params and updates/adds specified key
    function updateUrl(key, value) {
        const url = new URL(window.location.href);
        url.searchParams.set(key, value);
        window.location.href = url.toString();
    }

    // Base Map Picker Logic
    const basemapPicker = document.getElementById('basemapPicker');
    if (basemapPicker) {
        basemapPicker.addEventListener('change', (e) => {
            updateUrl('basemap', e.target.value);
        });
    }

    // Color Picker Logic
    const colorPicker = document.getElementById('colorPicker');
    if (colorPicker) {
        colorPicker.addEventListener('change', (e) => {
            updateUrl('color', e.target.value);
        });
    }

    // Width Picker Logic
    const widthPicker = document.getElementById('widthPicker');
    const widthValue = document.getElementById('widthValue');
    if (widthPicker && widthValue) {
        widthPicker.addEventListener('input', (e) => {
            widthValue.textContent = e.target.value;
        });

        widthPicker.addEventListener('change', (e) => {
            updateUrl('width', e.target.value);
        });
    }

    // Opacity Picker Logic
    const opacityPicker = document.getElementById('opacityPicker');
    const opacityValue = document.getElementById('opacityValue');
    if (opacityPicker && opacityValue) {
        opacityPicker.addEventListener('input', (e) => {
            opacityValue.textContent = e.target.value + '%';
        });

        opacityPicker.addEventListener('change', (e) => {
            updateUrl('opacity', e.target.value);
        });
    }

    // Export Logic
    const exportBtn = document.getElementById('exportBtn');
    if (exportBtn) {
        exportBtn.addEventListener('click', () => {
            const mapContainer = document.getElementById('map-container');

            // Try to find the iframe containing the Folium map
            const iframe = mapContainer.querySelector('iframe');
            if (iframe) {
                try {
                    // Access iframe content
                    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    const mapElement = iframeDoc.querySelector('.folium-map') || iframeDoc.body;

                    html2canvas(mapElement, {
                        useCORS: true,
                        allowTaint: true
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.download = 'kinetiqo-map.png';
                        link.href = canvas.toDataURL();
                        link.click();
                    }).catch(err => {
                        console.error("Export failed:", err);
                        alert("Could not export map to image. This is often due to browser security restrictions with map tiles. Try taking a screenshot instead.");
                    });
                } catch (err) {
                    console.error("Cannot access iframe content:", err);
                    alert("Could not export map to image due to cross-origin restrictions. Try taking a screenshot instead.");
                }
            } else {
                // Direct map rendering (not in iframe)
                html2canvas(mapContainer, {
                    useCORS: true,
                    allowTaint: true
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'kinetiqo-map.png';
                    link.href = canvas.toDataURL();
                    link.click();
                }).catch(err => {
                    console.error("Export failed:", err);
                    alert("Could not export map to image. This is often due to browser security restrictions with map tiles.");
                });
            }
        });
    }
</script>
{% endblock %}
