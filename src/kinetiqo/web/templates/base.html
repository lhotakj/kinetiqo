<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Kinetiqo</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#F9F9F8',  /* Main Background */
                            100: '#F5F4F0', /* Sidebar Background */
                            200: '#E8E6E1', /* Borders/Hover */
                            300: '#D8D6D0',
                            800: '#4A4844',
                            900: '#2C2A26', /* Primary Text */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Overrides for "Claude-like" feel */
        body { background-color: #FDFDFC; color: #2C2A26; }

        /* Sidebar Polish */
        .nav-item { transition: all 0.2s ease; border-radius: 0.5rem; }
        .nav-item:hover { background-color: #E8E6E1; }
        .nav-item.active { background-color: #E8E6E1; font-weight: 500; }

        /* DataTables Minimalist Style */
        .dataTables_wrapper .dataTables_length,
        .dataTables_wrapper .dataTables_filter,
        .dataTables_wrapper .dataTables_info,
        .dataTables_wrapper .dataTables_paginate {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 1rem;
            margin-top: 1rem;
        }
        table.dataTable.no-footer { border-bottom: 1px solid #E5E7EB; }
        table.dataTable thead th { border-bottom: 1px solid #E5E7EB; font-weight: 600; color: #4B5563; }

        /* Fade In Animation for HTMX */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="h-full flex antialiased">

    <aside class="w-64 bg-warm-100 flex flex-col h-screen border-r border-warm-200 flex-shrink-0">
        <div class="p-6 pb-2">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-8 h-8 bg-warm-800 rounded-md flex items-center justify-center text-white font-serif font-bold">J</div>
                <span class="font-serif text-xl font-bold text-warm-900 tracking-tight">Kinetiqo</span>
            </div>
        </div>

        <nav class="flex-1 px-4 space-y-1 overflow-y-auto">
            <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4 px-2">Menu</div>

            <a href="{{ url_for('activities') }}" class="nav-item flex items-center px-3 py-2 text-sm text-warm-900 {% if request.path == '/activities' %}active{% endif %}">
                <svg class="w-4 h-4 mr-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Activities
            </a>

            <a href="{{ url_for('fullsync') }}" class="nav-item flex items-center px-3 py-2 text-sm text-warm-900 {% if request.path == '/fullsync' %}active{% endif %}">
                <svg class="w-4 h-4 mr-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Full Sync
            </a>

            <a href="{{ url_for('fastsync') }}" class="nav-item flex items-center px-3 py-2 text-sm text-warm-900 {% if request.path == '/fastsync' %}active{% endif %}">
                <svg class="w-4 h-4 mr-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Fast Sync
            </a>
        </nav>

        <div class="p-4 border-t border-warm-200">
            <div class="flex items-center gap-3 px-2 py-2 rounded-md hover:bg-warm-200 cursor-pointer transition">
                <div class="w-8 h-8 rounded-full bg-orange-200 text-orange-800 flex items-center justify-center font-bold text-xs border border-orange-300">
                    {{ current_user.id[0]|upper }}
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">{{ current_user.id }}</p>
                    <p class="text-xs text-gray-500 truncate">Pro Plan</p>
                </div>
                <a href="{{ url_for('logout') }}" class="text-gray-400 hover:text-gray-600" title="Logout">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </a>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-white">
        <div class="flex-1 overflow-y-auto p-8 lg:p-12">
            <div class="max-w-5xl mx-auto">
                {% block content %}{% endblock %}
            </div>
        </div>
    </main>

</body>
</html>
