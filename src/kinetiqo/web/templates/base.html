<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Kinetiqo</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/sse.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        warm: {
                            50: '#F9F9F8',  /* Main Background */
                            100: '#F5F4F0', /* Sidebar Background */
                            200: '#E8E6E1', /* Borders/Hover */
                            300: '#D8D6D0',
                            800: '#4A4844',
                            900: '#2C2A26', /* Primary Text */
                        },
                        dark: {
                            50: '#1a1a1a',
                            100: '#262626',
                            200: '#404040',
                            300: '#525252',
                            800: '#d4d4d4',
                            900: '#f5f5f5',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Overrides for "Claude-like" feel */
        body { background-color: #FDFDFC; color: #2C2A26; transition: background-color 0.3s, color 0.3s; }
        body.dark { background-color: #171717; color: #e5e5e5; }

        /* Sidebar Polish */
        .nav-item { transition: all 0.2s ease; border-radius: 0.5rem; }
        .nav-item:hover { background-color: #E8E6E1; }
        .nav-item.active { background-color: #E8E6E1; font-weight: 500; }

        body.dark .nav-item:hover { background-color: #404040; }
        body.dark .nav-item.active { background-color: #404040; color: #f5f5f5; }
        body.dark aside { background-color: #262626; border-color: #404040; }
        body.dark .text-warm-900 { color: #f5f5f5; }
        body.dark .text-gray-500 { color: #a3a3a3; }
        body.dark .text-gray-600 { color: #d4d4d4; }
        body.dark .text-gray-700 { color: #d4d4d4; }
        body.dark .text-gray-900 { color: #f5f5f5; }
        body.dark .bg-white { background-color: #1a1a1a; border-color: #404040; }
        body.dark .bg-gray-50 { background-color: #262626; }
        body.dark .bg-gray-100 { background-color: #2a2a2a; }
        body.dark .hover\:bg-gray-100:hover { background-color: #333333; }
        body.dark .hover\:bg-gray-200:hover { background-color: #404040; }
        body.dark main { background-color: #171717; }
        body.dark .border-warm-200 { border-color: #404040; }
        body.dark .border-gray-100 { border-color: #333333; }
        body.dark .border-gray-200 { border-color: #404040; }
        body.dark .border-gray-300 { border-color: #525252; }
        body.dark .hover\:bg-warm-200:hover { background-color: #404040; }

        /* Input fields dark mode */
        body.dark input[type="text"],
        body.dark input[type="password"] {
            background-color: #262626;
            border-color: #404040;
            color: #e5e5e5;
        }
        body.dark input[type="text"]:focus,
        body.dark input[type="password"]:focus {
            background-color: #2a2a2a;
            border-color: #525252;
        }
        body.dark input::placeholder {
            color: #737373;
        }

        /* Button dark mode */
        body.dark button.bg-gray-900 {
            background-color: #f5f5f5;
            color: #171717;
        }
        body.dark button.bg-gray-900:hover {
            background-color: #e5e5e5;
        }

        /* User section dark mode */
        body.dark .bg-orange-200 {
            background-color: #7c2d12;
        }
        body.dark .text-orange-800 {
            color: #fed7aa;
        }
        body.dark .border-orange-300 {
            border-color: #9a3412;
        }
        body.dark .text-gray-400 {
            color: #737373;
        }
        body.dark .hover\:text-gray-600:hover {
            color: #d4d4d4;
        }

        /* DataTables Minimalist Style */
        .dataTables_wrapper .dataTables_length,
        .dataTables_wrapper .dataTables_filter,
        .dataTables_wrapper .dataTables_info,
        .dataTables_wrapper .dataTables_paginate {
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            color: #666;
            margin-bottom: 1rem;
            margin-top: 1rem;
        }
        body.dark .dataTables_wrapper .dataTables_length,
        body.dark .dataTables_wrapper .dataTables_filter,
        body.dark .dataTables_wrapper .dataTables_info,
        body.dark .dataTables_wrapper .dataTables_paginate {
            color: #a3a3a3;
        }

        table.dataTable.no-footer { border-bottom: 1px solid #E5E7EB; }
        body.dark table.dataTable.no-footer { border-bottom: 1px solid #404040; }

        table.dataTable thead th { border-bottom: 1px solid #E5E7EB; font-weight: 600; color: #4B5563; }
        body.dark table.dataTable thead th { border-bottom: 1px solid #404040; color: #d4d4d4; }

        body.dark table.dataTable tbody tr { background-color: #1a1a1a; color: #d4d4d4; }
        body.dark table.dataTable tbody tr:hover { background-color: #262626; }
        body.dark table.dataTable tfoot { background-color: #262626; color: #d4d4d4; }
        body.dark table.dataTable tfoot tr { border-color: #404040; }

        /* DataTables pagination buttons */
        body.dark .dataTables_wrapper .dataTables_paginate .paginate_button {
            color: #d4d4d4 !important;
        }
        body.dark .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
            background: #333333 !important;
            border-color: #404040 !important;
            color: #f5f5f5 !important;
        }
        body.dark .dataTables_wrapper .dataTables_paginate .paginate_button.current {
            background: #404040 !important;
            border-color: #525252 !important;
            color: #f5f5f5 !important;
        }
        body.dark .dataTables_wrapper .dataTables_paginate .paginate_button.disabled {
            color: #525252 !important;
        }

        /* DataTables filter input */
        body.dark .dataTables_wrapper .dataTables_filter input {
            background-color: #262626;
            border-color: #404040;
            color: #e5e5e5;
        }
        body.dark .dataTables_wrapper .dataTables_length select {
            background-color: #262626;
            border-color: #404040;
            color: #e5e5e5;
        }

        /* Fade In Animation for HTMX */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>

                <svg id="theme-icon-moon" class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>

        <div class="flex-1 overflow-y-auto p-8 lg:p-12">
            <div class="w-full px-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </main>

    <script>
        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIconSun = document.getElementById('theme-icon-sun');
        const themeIconMoon = document.getElementById('theme-icon-moon');
        const themeText = document.getElementById('theme-text');
        const body = document.body;

        function setTheme(isDark) {
            if (isDark) {
                body.classList.add('dark');
                themeIconSun.classList.remove('hidden');
                themeIconMoon.classList.add('hidden');
                themeText.textContent = 'Light Mode';
                document.cookie = "theme=dark; path=/; max-age=31536000"; // 1 year
            } else {
                body.classList.remove('dark');
                themeIconSun.classList.add('hidden');
                themeIconMoon.classList.remove('hidden');
                themeText.textContent = 'Dark Mode';
                document.cookie = "theme=light; path=/; max-age=31536000";
            }
        }

        // Check cookie on load
        const cookies = document.cookie.split(';').map(c => c.trim().split('='));
        const themeCookie = cookies.find(c => c[0] === 'theme');
        if (themeCookie && themeCookie[1] === 'dark') {
            setTheme(true);
        }

        themeToggleBtn.addEventListener('click', () => {
            setTheme(!body.classList.contains('dark'));
        });
    </script>
