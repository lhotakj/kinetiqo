    <!-- Theme initialization: set background colour immediately to prevent flash on dark theme -->
    <script>
        (function() {
            function getTheme() {
                var cookies = document.cookie.split(';').map(function(c) { return c.trim().split('='); });
                var themeCookie = cookies.find(function(c) { return c[0] === 'theme'; });
                if (themeCookie) return themeCookie[1];
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
                return 'light';
            }
            var theme = getTheme();
            if (theme === 'dark') {
                document.documentElement.classList.add('dark');
                document.write('<style>html.dark,html.dark body{background-color:#1a1a1a!important;color:#f5f5f5!important}</style>');
            } else {
                document.documentElement.classList.remove('dark');
                document.write('<style>html,body{background-color:#F9F9F8;color:#2C2A26}</style>');
            }
        })();
    </script>

<script>
    // Theme Toggle Logic
    const themeToggleBtn = document.getElementById('theme-toggle');
    const themeIconSun = document.getElementById('theme-icon-sun');
    const themeIconMoon = document.getElementById('theme-icon-moon');
    const themeText = document.getElementById('theme-text');
    const body = document.body;

    function updateThemeUI(isDark) {
        if (isDark) {
            themeIconSun.classList.remove('hidden');
            themeIconMoon.classList.add('hidden');
            themeText.textContent = 'Light Mode';
        } else {
            themeIconSun.classList.add('hidden');
            themeIconMoon.classList.remove('hidden');
            themeText.textContent = 'Dark Mode';
        }
    }

    function setTheme(isDark) {
        if (isDark) {
            document.documentElement.classList.add('dark');
            document.body.classList.add('dark');
            document.cookie = "theme=dark; path=/; max-age=31536000"; // 1 year
        } else {
            document.documentElement.classList.remove('dark');
            document.body.classList.remove('dark');
            document.cookie = "theme=light; path=/; max-age=31536000";
        }
        updateThemeUI(isDark);
    }

    // Initial UI update based on current state (set by head script)
    // Also ensure body class is synced with html class
    if (document.documentElement.classList.contains('dark')) {
        document.body.classList.add('dark');
        updateThemeUI(true);
    } else {
        document.body.classList.remove('dark');
        updateThemeUI(false);
    }

    themeToggleBtn.addEventListener('click', () => {
        setTheme(!document.documentElement.classList.contains('dark'));
    });

    // Fetch latest version
    document.addEventListener('DOMContentLoaded', function () {
        fetch('/latest-version')
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    const container = document.getElementById('new-version-container');
                    container.textContent = data.message;
                    container.classList.remove('hidden');
                }
            })
            .catch(error => console.error('Error fetching latest version:', error));
    });
</script>
